name: Artifact Transfer Between Jobs

on:
    workflow_dispatch:

jobs:
    
    job-upload:
        runs-on: ubuntu-latest

        steps:
            - name: craete file'
              run: |
               echo "Hello fro upload job" > file.txt
               echo "Artifact tranfer demo" >> file.txt

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                name: my-artifact
                path: file.txt
                
    job-download:
        runs-on: ubuntu-latest
        needs: job-upload
        steps:
            - name: Download Artifact
              uses: actions/download-artifact@v4
              with:
                name: my-artifact
                
            - name: Print file content
              run: |
                cat file.txt    