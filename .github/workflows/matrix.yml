name: Matrix_test

on:
    push:
        branches:
            - main

jobs:
    matrix-run:

        runs-on: ubuntu-latest     
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11","3.12","3.12"]

        
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}


