name: Job Output Practice

on:
     workflow_dispatch:
    # push

jobs:

    generate-date:
        runs-on: ubuntu-latest

        outputs:
            today: ${{ steps.date_step.outputs.today }}

        steps:
            - name: Get today's date
              id: date_step
              run: |
                echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    print-date:
        runs-on: ubuntu-latest
        needs: generate-date
        
        steps:
            - name: Print date from previous job
              run: |
                echo "Date from previous job: ${{ needs.generate-date.outputs.today }}"