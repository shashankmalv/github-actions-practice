name: Artifact Practice

on: 
    workflow_dispatch:

jobs:
    upload-artifact:
        runs-on: ubuntu-latest

        steps:
            - name: Generate test Report
              run: |
                echo "Test Report -$(date)" > report.txt
                echo "ALL test apssed" >> report.txt
                cat report.txt


            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: test-report
                path: report.txt