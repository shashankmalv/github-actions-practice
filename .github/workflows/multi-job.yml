name: multi-job

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:
            - name: build step
              run: echo "Building the app"

    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Test step
              run: echo "Running tests"

    deploy:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: deploy step
              run: echo "Deploying"      

