name: Environment Variables Practice

on:
     workflow_dispatch:
    # push

# Workflow level variable
env:
    APP_NAME: myapp

jobs:
    shows-env-var:
        runs-on: ubuntu-latest

        # Job level variable
        env:
            ENVIRONMENT: staging

        steps:
            - name: Print All Variable

              # Step level variable
              env:
                    VERSION: 1.0.0
              run: |

                echo "App Name: $APP_NAME"
                echo "Environment: $ENVIRONMENT"
                echo "Version: $VERSION"

                echo "Commit SHA: $GITHUB_SHA"
                echo "Triggered by: $GITHUB_ACTOR"

